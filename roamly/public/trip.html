<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roamly — Trip Itinerary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #D4664A; --primary-hover: #BF5538;
      --bg: #F5F4F0; --white: #FFFFFF;
      --heading: #1F1F1F; --body: #6B7280;
      --border: #E2E0DC; --input-border: #D8D6D2;
      --placeholder: #ADADAD; --radius: 10px;
    }
    body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--heading); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* NAV */
    .navbar { height: 60px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 40; box-shadow: 0 1px 4px rgba(31,31,31,0.05); gap: 12px; }
    .nav-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .nav-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--body); text-decoration: none; padding: 6px 10px; border-radius: 7px; transition: background .15s, color .15s; white-space: nowrap; flex-shrink: 0; }
    .nav-back:hover { background: var(--bg); color: var(--heading); }
    .nav-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .nav-trip-name { font-size: 14px; font-weight: 600; color: var(--heading); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
    .nav-logo-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--primary); display: flex; align-items: center; justify-content: center; }
    .nav-logo-name { font-family: 'Fraunces', Georgia, serif; font-size: 16px; font-weight: 600; color: var(--heading); letter-spacing: -0.02em; }

    /* HERO */
    .trip-hero { padding: 32px 28px 0; max-width: 1100px; margin: 0 auto; }
    .hero-card { border-radius: 14px; overflow: hidden; margin-bottom: 28px; }
    .hero-cover { height: 160px; display: flex; align-items: flex-end; padding: 20px 24px; position: relative; }
    .hero-cover-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%); }
    .hero-info { position: relative; z-index: 1; }
    .hero-destination { font-family: 'Fraunces', Georgia, serif; font-size: 28px; font-weight: 600; color: #fff; letter-spacing: -0.02em; line-height: 1.1; }
    .hero-sub { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 4px; }
    .hero-meta-bar { background: var(--white); border: 1px solid var(--border); border-top: none; border-radius: 0 0 14px 14px; display: flex; align-items: center; padding: 14px 24px; gap: 24px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--body); }
    .meta-item strong { color: var(--heading); font-weight: 600; }
    .meta-sep { width: 1px; height: 16px; background: var(--border); }

    /* MAIN LAYOUT */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 0 28px 80px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; }

    /* DAY SIDEBAR */
    .day-sidebar { padding-top: 4px; }
    .day-sidebar-title { font-size: 11px; font-weight: 600; color: var(--body); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; padding: 0 2px; }
    .day-btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; border: none; background: none; cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; transition: background .15s; margin-bottom: 4px; }
    .day-btn:hover { background: rgba(0,0,0,0.04); }
    .day-btn.active { background: var(--white); border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(31,31,31,0.06); }
    .day-btn-num { width: 28px; height: 28px; border-radius: 8px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--body); flex-shrink: 0; transition: background .15s, color .15s; }
    .day-btn.active .day-btn-num { background: var(--primary); color: #fff; }
    .day-btn-info { min-width: 0; }
    .day-btn-label { font-size: 13px; font-weight: 500; color: var(--heading); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-btn-count { font-size: 11.5px; color: var(--body); }

    /* ITINERARY PANEL */
    .itin-panel { min-width: 0; }
    .itin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
    .itin-day-title { font-family: 'Fraunces', Georgia, serif; font-size: 22px; font-weight: 600; color: var(--heading); letter-spacing: -0.02em; }
    .itin-day-date { font-size: 13px; color: var(--body); margin-top: 2px; }
    .itin-actions { display: flex; gap: 8px; }

    /* BUTTONS */
    .btn-primary { display: inline-flex; align-items: center; gap: 6px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 16px; cursor: pointer; transition: background .18s, box-shadow .18s, transform .1s; box-shadow: 0 2px 6px rgba(212,102,74,0.25); white-space: nowrap; }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(212,102,74,0.35); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-outline { display: inline-flex; align-items: center; gap: 6px; background: var(--white); color: var(--heading); border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 16px; cursor: pointer; transition: background .15s, border-color .15s; white-space: nowrap; }
    .btn-outline:hover { background: var(--bg); border-color: #C8C5BF; }

    /* STOP CARD */
    .stops-list { display: flex; flex-direction: column; gap: 0; }
    .stop-item { display: flex; gap: 14px; position: relative; padding-bottom: 6px; }
    .stop-item:not(:last-child) .stop-line { display: block; }
    .stop-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
    .stop-dot { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; border: 1px solid var(--border); background: var(--white); }
    .stop-line { display: none; width: 2px; background: var(--border); flex: 1; min-height: 20px; margin: 4px 0; }
    .stop-travel-gap { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--placeholder); padding: 4px 0 4px 8px; }
    .stop-right { flex: 1; min-width: 0; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; transition: box-shadow .18s; }
    .stop-right:hover { box-shadow: 0 2px 10px rgba(31,31,31,0.07); }
    .stop-time { font-size: 11.5px; font-weight: 600; color: var(--primary); letter-spacing: 0.02em; margin-bottom: 2px; }
    .stop-name { font-size: 14px; font-weight: 600; color: var(--heading); letter-spacing: -0.01em; }
    .stop-meta { font-size: 12px; color: var(--body); margin-top: 3px; }
    .stop-row-actions { display: flex; gap: 6px; margin-top: 8px; }
    .stop-action-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--body); background: var(--bg); border: none; border-radius: 6px; padding: 4px 9px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s, color .15s; }
    .stop-action-btn:hover { background: #ECEAE6; color: var(--heading); }
    .stop-action-btn.danger:hover { background: #FEF2F2; color: #DC2626; }
    .stop-action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .stop-action-btn:disabled:hover { background: var(--bg); color: var(--body); }

    /* TRAVEL CONNECTOR */
    .travel-connector { display: flex; align-items: center; gap: 8px; padding: 4px 0 4px 54px; margin-bottom: 4px; }
    .travel-line { flex: 1; height: 1px; background: var(--border); max-width: 40px; }
    .travel-label { font-size: 11.5px; color: var(--placeholder); display: flex; align-items: center; gap: 4px; }

    /* EMPTY DAY */
    .empty-day { text-align: center; padding: 60px 20px; background: var(--white); border: 1.5px dashed var(--border); border-radius: 14px; }
    .empty-day-title { font-size: 15px; font-weight: 600; color: var(--heading); margin-bottom: 6px; }
    .empty-day-sub { font-size: 13px; color: var(--body); line-height: 1.6; margin-bottom: 20px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(31,31,31,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn .18s ease; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    .modal-card { background: var(--white); border-radius: 14px; width: 100%; max-width: 460px; box-shadow: 0 8px 40px rgba(31,31,31,0.18); animation: slideUp .22s ease; overflow: hidden; }
    @keyframes slideUp { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:translateY(0) } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px 16px; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-family: 'Fraunces', Georgia, serif; font-size: 19px; font-weight: 600; color: var(--heading); letter-spacing: -0.02em; }
    .modal-close { width: 30px; height: 30px; border-radius: 7px; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--body); transition: background .15s; }
    .modal-close:hover { background: var(--bg); }
    .modal-body-inner { padding: 20px 22px; }
    .modal-footer { padding: 0 22px 20px; display: flex; gap: 10px; }
    .field-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .field-row-2 .field-group { margin-bottom: 0; }
    label { font-size: 13px; font-weight: 500; color: var(--heading); }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 0 12px; height: 40px;
      border: 1px solid var(--input-border); border-radius: 8px;
      background: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--heading); outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    textarea { height: auto; padding: 10px 12px; resize: vertical; min-height: 70px; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(212,102,74,0.13); }
    input::placeholder, textarea::placeholder { color: var(--placeholder); }
    select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; cursor: pointer; }
    .btn-cancel { flex: 1; height: 40px; background: var(--bg); color: var(--body); border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .btn-cancel:hover { background: #ECEAE6; }
    .btn-submit { flex: 2; height: 40px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .18s; box-shadow: 0 2px 6px rgba(212,102,74,0.25); }
    .btn-submit:hover { background: var(--primary-hover); }
    .btn-submit.loading { opacity: 0.72; cursor: not-allowed; pointer-events: none; }
    .error-msg { font-size: 13px; color: #DC2626; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 9px 12px; margin-bottom: 12px; }

    /* EMOJI PICKER */
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .emoji-opt { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s; }
    .emoji-opt.selected { border-color: var(--primary); background: rgba(212,102,74,0.08); }
    .emoji-opt:hover { border-color: var(--primary); }

    /* SUGGESTIONS PANEL */
    .suggest-panel { background: var(--white); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 20px; overflow: hidden; animation: slideUp .22s ease; }
    .suggest-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
    .suggest-panel-title { font-size: 13px; font-weight: 600; color: var(--heading); display: flex; align-items: center; gap: 7px; }
    .suggest-badge { font-size: 10.5px; font-weight: 600; background: rgba(212,102,74,0.1); color: var(--primary); border-radius: 5px; padding: 2px 7px; letter-spacing: 0.03em; text-transform: uppercase; }
    .suggest-close-btn { width: 28px; height: 28px; border-radius: 7px; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--body); transition: background .15s; }
    .suggest-close-btn:hover { background: var(--bg); }
    .suggest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 18px 16px; }
    @media (max-width: 800px) { .suggest-grid { grid-template-columns: repeat(2, 1fr); } }
    .suggest-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; transition: border-color .18s, box-shadow .18s, transform .12s; background: var(--bg); }
    .suggest-card:hover { border-color: var(--primary); box-shadow: 0 3px 12px rgba(212,102,74,0.15); transform: translateY(-1px); }
    .suggest-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .suggest-emoji { font-size: 20px; }
    .suggest-name { font-size: 13px; font-weight: 600; color: var(--heading); line-height: 1.25; }
    .suggest-desc { font-size: 11.5px; color: var(--body); line-height: 1.5; margin-bottom: 8px; }
    .suggest-meta { display: flex; align-items: center; justify-content: space-between; }
    .suggest-duration { font-size: 11px; color: var(--body); background: var(--white); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; }
    .suggest-add-btn { font-size: 11.5px; font-weight: 600; color: var(--primary); background: none; border: none; cursor: pointer; padding: 0; font-family: 'DM Sans', sans-serif; transition: color .15s; }
    .suggest-add-btn:hover { color: var(--primary-hover); }
    /* Loading skeleton */
    .suggest-skeleton { border-radius: 10px; background: linear-gradient(90deg, #ECEAE6 25%, #F5F4F0 50%, #ECEAE6 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; height: 100px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .suggest-error { padding: 16px 18px; font-size: 13px; color: var(--body); display: flex; align-items: center; gap: 8px; }

    /* GENERATE DAY PLAN BUTTON */
    .btn-generate { display: inline-flex; align-items: center; gap: 6px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 16px; cursor: pointer; transition: background .18s, box-shadow .18s, transform .1s; box-shadow: 0 2px 8px rgba(212,102,74,0.35); white-space: nowrap; }
    .btn-generate:hover { background: var(--primary-hover); box-shadow: 0 4px 14px rgba(212,102,74,0.45); }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate.loading { opacity: 0.72; cursor: not-allowed; pointer-events: none; }

    /* GENERATED PLAN PREVIEW */
    .gen-plan-overlay { position: fixed; inset: 0; background: rgba(31,31,31,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn .18s ease; }
    .gen-plan-card { background: var(--white); border-radius: 16px; width: 100%; max-width: 560px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 12px 50px rgba(31,31,31,0.22); animation: slideUp .22s ease; }
    .gen-plan-header { padding: 20px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .gen-plan-title { font-family: 'Fraunces', Georgia, serif; font-size: 20px; font-weight: 600; color: var(--heading); letter-spacing: -0.02em; }
    .gen-plan-sub { font-size: 13px; color: var(--body); margin-top: 3px; }
    .gen-plan-body { overflow-y: auto; padding: 18px 22px; flex: 1; }
    .gen-plan-footer { padding: 14px 22px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
    .gen-stop-item { display: flex; gap: 12px; margin-bottom: 4px; }
    .gen-stop-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 36px; }
    .gen-stop-emoji { width: 36px; height: 36px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .gen-stop-connector { width: 2px; background: var(--border); flex: 1; min-height: 12px; margin: 3px 0; }
    .gen-stop-right { flex: 1; min-width: 0; padding-bottom: 4px; }
    .gen-stop-name { font-size: 14px; font-weight: 600; color: var(--heading); letter-spacing: -0.01em; }
    .gen-stop-duration { font-size: 11.5px; color: var(--primary); font-weight: 600; margin-bottom: 3px; }
    .gen-stop-activity { font-size: 12.5px; color: var(--body); line-height: 1.55; margin-bottom: 6px; }
    .gen-travel-note { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; color: var(--placeholder); background: var(--bg); border-radius: 7px; padding: 6px 10px; margin-bottom: 10px; line-height: 1.45; }

    /* SUGGEST BUTTON */
    .btn-suggest { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, rgba(212,102,74,0.1) 0%, rgba(212,102,74,0.05) 100%); color: var(--primary); border: 1px solid rgba(212,102,74,0.25); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 14px; cursor: pointer; transition: background .18s, border-color .18s, transform .1s; white-space: nowrap; }
    .btn-suggest:hover { background: rgba(212,102,74,0.15); border-color: rgba(212,102,74,0.4); }
    .btn-suggest:active { transform: scale(0.98); }
    .btn-suggest.loading { opacity: 0.65; cursor: not-allowed; pointer-events: none; }

    @media (max-width: 700px) {
      .page-wrap { grid-template-columns: 1fr; }
      .day-sidebar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
      .day-btn { flex-shrink: 0; width: auto; padding: 8px 12px; }
      .day-sidebar-title { display: none; }
      .trip-hero, .page-wrap { padding-left: 16px; padding-right: 16px; }
      .field-row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="nav-left">
    <a href="dashboard.html" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      My Trips
    </a>
    <div class="nav-divider"></div>
    <span class="nav-trip-name" id="nav-trip-name">Loading…</span>
  </div>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
        <path d="M9 2C5.13 2 2 5.13 2 9s3.13 7 7 7 7-3.13 7-7-3.13-7-7-7z" stroke="white" stroke-width="1.4"/>
        <path d="M9 5v4l3 2" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="nav-logo-name">Roamly</span>
  </a>
</header>

<!-- HERO -->
<div class="trip-hero" id="trip-hero" style="display:none">
  <div class="hero-card">
    <div class="hero-cover" id="hero-cover">
      <div class="hero-cover-overlay"></div>
      <div class="hero-info">
        <div class="hero-destination" id="hero-destination">—</div>
        <div class="hero-sub" id="hero-sub">—</div>
      </div>
    </div>
    <div class="hero-meta-bar">
      <div class="meta-item"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="2.5" width="11" height="10" rx="1.5" stroke="#9CA3AF" stroke-width="1.2"/><path d="M4.5 1v3M9.5 1v3M1.5 7h11" stroke="#9CA3AF" stroke-width="1.2" stroke-linecap="round"/></svg><span id="meta-dates">—</span></div>
      <div class="meta-sep"></div>
      <div class="meta-item"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#9CA3AF" stroke-width="1.2"/><path d="M7 4.5V7l2 1.5" stroke="#9CA3AF" stroke-width="1.2" stroke-linecap="round"/></svg><strong id="meta-days">—</strong>&nbsp;days</div>
      <div class="meta-sep"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, collection, addDoc, getDocs, deleteDoc, updateDoc, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey: "AIzaSyA9OR2w5FgjvAy_rcGtWpT5R6tBNg1goBg",
    authDomain: "dhianne-ceb5c.firebaseapp.com",
    projectId: "dhianne-ceb5c",
    storageBucket: "dhianne-ceb5c.firebasestorage.app",
    messagingSenderId: "393795711893",
    appId: "1:393795711893:web:c8bd9c8eb8398f29c77c9c"
  });
  const db = getFirestore(app);

  /* ── AUTH GUARD ── */
  const session = JSON.parse(sessionStorage.getItem('roamly_session') || 'null');
  if (!session) { window.location.href = 'login.html'; }

  /* ── GET TRIP ID ── */
  const tripId = new URLSearchParams(window.location.search).get('id');
  if (!tripId) { window.location.href = 'dashboard.html'; }

  /* ── STATE ── */
  let trip = null;
  let allStops = [];
  let activeDay = 1;
  let editingStopId = null;
  let selectedEmoji = '📍';

  /* ── HELPERS ── */
  const PALETTES = [
    { from: '#D4664A', to: '#B85A3E' }, { from: '#3B6E8F', to: '#2D5570' },
    { from: '#4E7C59', to: '#3A5E42' }, { from: '#7C5C8F', to: '#5E4570' },
    { from: '#8F6B3B', to: '#6E5030' }, { from: '#3B7C7A', to: '#2D5E5C' },
  ];

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function formatDateRange(start, end) {
    if (!start) return 'Dates TBD';
    const s = new Date(start + 'T00:00:00');
    const e = end ? new Date(end + 'T00:00:00') : null;
    const opts = { month: 'short', day: 'numeric' };
    if (!e) return s.toLocaleDateString('en-US', opts);
    return s.toLocaleDateString('en-US', opts) + ' – ' + e.toLocaleDateString('en-US', {...opts, year: 'numeric'});
  }

  function dayCount(start, end) {
    if (!start || !end) return 1;
    return Math.max(1, Math.round((new Date(end) - new Date(start)) / 86400000) + 1);
  }

  function dayDate(dayNum) {
    if (!trip?.startDate) return '';
    const d = new Date(trip.startDate + 'T00:00:00');
    d.setDate(d.getDate() + dayNum - 1);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function minutesToTime(minutes) {
    const h = Math.floor(minutes / 60) % 24;
    const m = minutes % 60;
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  /* ── AUTO SCHEDULE ── */
  function autoSchedule(stops) {
    let cursor = 9 * 60; // 9:00 AM in minutes
    return stops.map(stop => {
      const scheduled = { ...stop, scheduledTime: minutesToTime(cursor) };
      cursor += parseInt(stop.duration || 60) + parseInt(stop.travelToNext || 20);
      return scheduled;
    });
  }

  /* ── LOAD TRIP ── */
  async function loadTrip() {
    try {
      const snap = await getDoc(doc(db, 'trips', tripId));
      if (!snap.exists()) { window.location.href = 'dashboard.html'; return; }
      trip = { id: snap.id, ...snap.data() };

      // Set nav
      document.getElementById('nav-trip-name').textContent = trip.name || trip.destination;
      document.title = `Roamly — ${trip.destination}`;

      // Hero
      const days = dayCount(trip.startDate, trip.endDate);
      const pIdx = Math.abs(tripId.charCodeAt(0)) % PALETTES.length;
      const p = PALETTES[pIdx];
      document.getElementById('hero-cover').style.background = `linear-gradient(135deg, ${p.from} 0%, ${p.to} 100%)`;
      document.getElementById('hero-destination').textContent = trip.destination;
      document.getElementById('hero-sub').textContent = trip.name && trip.name !== trip.destination ? trip.name : '';
      document.getElementById('meta-dates').textContent = formatDateRange(trip.startDate, trip.endDate);
      document.getElementById('meta-days').textContent = days;
      document.getElementById('meta-travelers').textContent = (trip.travelers || '1') + ' traveler' + (trip.travelers === '1' ? '' : 's');
      document.getElementById('trip-hero').style.display = 'block';
      document.getElementById('page-wrap').style.display = 'grid';

      // Build day sidebar
      buildDaySidebar(days);
      await loadStops();
    } catch (e) {
      console.error(e);
    }
  }

  function buildDaySidebar(days) {
    const sidebar = document.getElementById('day-sidebar');
    const title = sidebar.querySelector('.day-sidebar-title');
    sidebar.innerHTML = '';
    sidebar.appendChild(title);
    for (let i = 1; i <= days; i++) {
      const btn = document.createElement('button');
      btn.className = 'day-btn' + (i === activeDay ? ' active' : '');
      btn.dataset.day = i;
      btn.innerHTML = `<div class="day-btn-num">${i}</div><div class="day-btn-info"><div class="day-btn-label">Day ${i}</div><div class="day-btn-count" id="day-count-${i}">${dayDate(i)}</div></div>`;
      btn.addEventListener('click', () => selectDay(i));
      sidebar.appendChild(btn);
    }
  }

  function selectDay(day) {
    activeDay = day;
    document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.day) === day));
    document.getElementById('itin-day-title').textContent = `Day ${day}`;
    document.getElementById('itin-day-date').textContent = dayDate(day);
    renderStops();
  }

  /* ── LOAD STOPS ── */
  async function loadStops() {
    try {
      const q = query(collection(db, 'trips', tripId, 'stops'));
      const snap = await getDocs(q);
      allStops = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0)-(b.order||0));
    } catch (e) { allStops = []; }
    selectDay(activeDay);
  }

  function renderStops() {
    const dayStops = allStops.filter(s => s.day === activeDay);
    const scheduled = autoSchedule(dayStops);
    const container = document.getElementById('stops-container');

    if (scheduled.length === 0) {
      container.innerHTML = `
        <div class="empty-day">
          <div style="font-size:36px;margin-bottom:12px">🗺️</div>
          <div class="empty-day-title">No stops for Day ${activeDay} yet</div>
          <div class="empty-day-sub">Add hotels, restaurants, attractions — anything you want to do on this day.</div>
          <button class="btn-primary" onclick="document.getElementById('add-stop-btn').click()">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2v9M2 6.5h9" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
            Add First Stop
          </button>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="stops-list">${scheduled.map((stop, idx) => stopHTML(stop, idx, scheduled.length)).join('')}</div>`;

    scheduled.forEach((stop, i) => {
      document.getElementById('edit-'+stop.id)?.addEventListener('click', () => openStopModal(stop));
      document.getElementById('del-'+stop.id)?.addEventListener('click', () => deleteStop(stop.id));
      document.getElementById('up-'+stop.id)?.addEventListener('click', () => moveStop(stop.id, -1));
      document.getElementById('down-'+stop.id)?.addEventListener('click', () => moveStop(stop.id, 1));
    });
  }

  function stopHTML(stop, idx, total) {
    const isLast = idx === total - 1;
    const isFirst = idx === 0;
    return `
      <div class="stop-item">
        <div class="stop-left">
          <div class="stop-dot">${esc(stop.emoji || '📍')}</div>
          ${!isLast ? '<div class="stop-line"></div>' : ''}
        </div>
        <div style="flex:1;min-width:0">
          <div class="stop-right">
            <div class="stop-time">${stop.scheduledTime}</div>
            <div class="stop-name">${esc(stop.name)}</div>
            <div class="stop-meta">${stop.duration || 60} min${stop.notes ? ' · ' + esc(stop.notes) : ''}</div>
            <div class="stop-row-actions">
              <button class="stop-action-btn" id="up-${stop.id}" title="Move up" ${isFirst ? 'disabled' : ''}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 7.5L6 4l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <button class="stop-action-btn" id="down-${stop.id}" title="Move down" ${isLast ? 'disabled' : ''}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <button class="stop-action-btn" id="edit-${stop.id}">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Edit
              </button>
              <button class="stop-action-btn danger" id="del-${stop.id}">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M4.5 3V2h3v1M4.5 5v4M7.5 5v4M2.5 3l.6 6.5h5.8l.6-6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Delete
              </button>
            </div>
          </div>
          ${!isLast ? `<div class="travel-connector"><div class="travel-line"></div><span class="travel-label">🚶 ${stop.travelToNext || 20} min travel</span></div>` : ''}
        </div>
      </div>`;
  }

  /* ── REORDER STOPS ── */
  async function moveStop(stopId, delta) {
    const dayStops = allStops.filter(s => s.day === activeDay).sort((a,b) => (a.order||0)-(b.order||0));
    const idx = dayStops.findIndex(s => s.id === stopId);
    const swapIdx = idx + delta;
    if (idx === -1 || swapIdx < 0 || swapIdx >= dayStops.length) return;
    dayStops.forEach((s, i) => { s.order = i; });
    [dayStops[idx].order, dayStops[swapIdx].order] = [dayStops[swapIdx].order, dayStops[idx].order];
    try {
      await Promise.all([
        updateDoc(doc(db, 'trips', tripId, 'stops', dayStops[idx].id), { order: dayStops[idx].order }),
        updateDoc(doc(db, 'trips', tripId, 'stops', dayStops[swapIdx].id), { order: dayStops[swapIdx].order }),
      ]);
    } catch (e) { console.error('Reorder failed:', e); }
    await loadStops();
  }

  /* ── AUTO SCHEDULE BUTTON ── */
  document.getElementById('auto-schedule-btn').addEventListener('click', async () => {
    const dayStops = allStops.filter(s => s.day === activeDay);
    if (dayStops.length === 0) return;
    const btn = document.getElementById('auto-schedule-btn');
    btn.textContent = 'Scheduled!';
    setTimeout(() => { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7 4v3l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg> Auto-schedule'; }, 1500);
    renderStops();
  });

  /* ── ADD/EDIT STOP MODAL ── */
  function openStopModal(stop = null) {
    editingStopId = stop ? stop.id : null;
    document.getElementById('stop-modal-title').textContent = stop ? 'Edit Stop' : 'Add Stop';
    document.getElementById('stop-modal-submit').textContent = stop ? 'Save Changes' : 'Add Stop';
    document.getElementById('stop-name').value     = stop?.name || '';
    document.getElementById('stop-duration').value = stop?.duration || 60;
    document.getElementById('stop-travel').value   = stop?.travelToNext || 20;
    document.getElementById('stop-notes').value    = stop?.notes || '';
    document.getElementById('stop-error').style.display = 'none';
    selectedEmoji = stop?.emoji || '📍';
    document.querySelectorAll('.emoji-opt').forEach(btn => btn.classList.toggle('selected', btn.dataset.emoji === selectedEmoji));
    document.getElementById('stop-modal').style.display = 'flex';
    document.getElementById('stop-name').focus();
  }

  function closeStopModal() { document.getElementById('stop-modal').style.display = 'none'; editingStopId = null; }

  document.getElementById('add-stop-btn').addEventListener('click',    () => openStopModal());
  document.getElementById('stop-modal-close').addEventListener('click',  closeStopModal);
  document.getElementById('stop-modal-cancel').addEventListener('click', closeStopModal);
  document.getElementById('stop-modal').addEventListener('click', e => { if (e.target === document.getElementById('stop-modal')) closeStopModal(); });

  /* Emoji picker */
  document.getElementById('emoji-grid').addEventListener('click', e => {
    const btn = e.target.closest('.emoji-opt'); if (!btn) return;
    document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedEmoji = btn.dataset.emoji;
  });

  document.getElementById('stop-modal-submit').addEventListener('click', async () => {
    const name     = document.getElementById('stop-name').value.trim();
    const duration = parseInt(document.getElementById('stop-duration').value) || 60;
    const travel   = parseInt(document.getElementById('stop-travel').value) || 20;
    const notes    = document.getElementById('stop-notes').value.trim();
    const errEl    = document.getElementById('stop-error');
    errEl.style.display = 'none';
    if (!name) { errEl.textContent = 'Please enter a place or activity name.'; errEl.style.display = 'block'; return; }

    const btn = document.getElementById('stop-modal-submit');
    btn.classList.add('loading'); btn.disabled = true;
    try {
      const data = { day: activeDay, name, emoji: selectedEmoji, duration, travelToNext: travel, notes, order: editingStopId ? undefined : allStops.filter(s => s.day === activeDay).length };
      if (editingStopId) {
        await updateDoc(doc(db, 'trips', tripId, 'stops', editingStopId), { name, emoji: selectedEmoji, duration, travelToNext: travel, notes });
      } else {
        await addDoc(collection(db, 'trips', tripId, 'stops'), data);
      }
      closeStopModal();
      await loadStops();
    } catch (e) {
      errEl.textContent = 'Something went wrong. Please try again.'; errEl.style.display = 'block';
    } finally {
      btn.classList.remove('loading'); btn.disabled = false;
    }
  });

  async function deleteStop(id) {
    await deleteDoc(doc(db, 'trips', tripId, 'stops', id)).catch(() => {});
    await loadStops();
  }

  /* ── GENERATE DAY PLAN (Gemini AI) ── */
  let generatedPlan = null;

  document.getElementById('generate-btn').addEventListener('click', () => {
    const btn = document.getElementById('generate-btn');
    btn.classList.add('loading');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="animation:spin .9s linear infinite"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3" stroke-dasharray="20 10"/></svg> Generating…`;
    try {
      const plan = generateDayPlan(trip?.destination, activeDay, dayCount(trip?.startDate, trip?.endDate));
      generatedPlan = plan;
      showGeneratedPlan(plan);
    } catch(e) {
      alert(e.message);
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1l1.5 3.5L12 5.5l-3 2.8.7 3.7L7 10.2 3.3 12l.7-3.7L1 5.5l3.5-1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg> Generate Day Plan`;
    }
  });

  function showGeneratedPlan(plan) {
    document.getElementById('gen-plan-title').textContent = `Day ${activeDay} Plan`;
    document.getElementById('gen-plan-sub').textContent = `${plan.length} stops · ${esc(trip?.destination)}`;
    const body = document.getElementById('gen-plan-body');
    body.innerHTML = plan.map((stop, idx) => {
      const isLast = idx === plan.length - 1;
      return `
        <div class="gen-stop-item">
          <div class="gen-stop-left">
            <div class="gen-stop-emoji">${esc(stop.emoji)}</div>
            ${!isLast ? '<div class="gen-stop-connector"></div>' : ''}
          </div>
          <div class="gen-stop-right">
            <div class="gen-stop-name">${esc(stop.name)}</div>
            <div class="gen-stop-duration">${stop.duration} min</div>
            <div class="gen-stop-activity">${esc(stop.activity)}</div>
            ${!isLast && stop.travelNote ? `<div class="gen-travel-note">🚇 ${esc(stop.travelNote)}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    document.getElementById('gen-plan-overlay').style.display = 'flex';
  }

  document.getElementById('gen-plan-close').addEventListener('click', () => { document.getElementById('gen-plan-overlay').style.display = 'none'; });
  document.getElementById('gen-plan-cancel').addEventListener('click', () => { document.getElementById('gen-plan-overlay').style.display = 'none'; });
  document.getElementById('gen-plan-overlay').addEventListener('click', e => { if (e.target === document.getElementById('gen-plan-overlay')) document.getElementById('gen-plan-overlay').style.display = 'none'; });

  document.getElementById('gen-plan-add').addEventListener('click', async () => {
    if (!generatedPlan) return;
    const btn = document.getElementById('gen-plan-add');
    btn.textContent = 'Adding stops…'; btn.disabled = true;
    try {
      const existingCount = allStops.filter(s => s.day === activeDay).length;
      await Promise.all(generatedPlan.map((stop, idx) =>
        addDoc(collection(db, 'trips', tripId, 'stops'), {
          day: activeDay, name: stop.name, emoji: stop.emoji,
          duration: stop.duration, travelToNext: stop.travelToNext || 20,
          notes: stop.travelNote || '', order: existingCount + idx
        })
      ));
      document.getElementById('gen-plan-overlay').style.display = 'none';
      await loadStops();
    } catch(e) {
      btn.textContent = 'Add All Stops to Day'; btn.disabled = false;
    }
  });

       {name:'Myeongdong Shopping Street',emoji:'🛍️',duration:90,activity:'Browse Korea\'s most famous cosmetics and fashion street. Try Korean BBQ beef on a skewer, tornado potato, and honey butter squid from the street food carts.',travelNote:'Take subway Line 2 to Jamsil for Lotte Tower.',travelToNext:20},
       {name:'Lotte World Tower & Seokchon Lake',emoji:'🌆',duration:60,activity:'Ride the 555m Lotte World Tower\'s all-glass elevator to the Sky 123 observation deck, then stroll the scenic lake outside where cherry blossoms frame the skyscraper.',travelNote:'Take subway to Banpo Bridge Han River Park.',travelToNext:20},
       {name:'Han River Banpo Bridge',emoji:'🌉',duration:60,activity:'Watch the Moonlight Rainbow Fountain — the world\'s longest bridge fountain shooting colored arcs into the Han River. Bring a convenience store chimaek (chicken & beer).',travelNote:'Take subway Line 9 to Express Bus Terminal, Line 3 to Gangnam.',travelToNext:25},
       {name:'Gangnam & COEX',emoji:'🐠',duration:90,activity:'Explore Starfield COEX Mall, including the incredible wall-to-wall Starfield Library and COEX Aquarium. The SM Town Coex Artium is perfect for K-pop fans.',travelNote:'',travelToNext:0}],
      [{name:'Dongdaemun Design Plaza (DDP)',emoji:'🏛️',duration:75,activity:'Wander the otherworldly Zaha Hadid-designed titanium building with rotating design exhibitions and a rooftop garden. The night-time LED facade is stunning.',travelNote:'Walk 10 min north to Ihwa Mural Village on Naksan hill.',travelToNext:10},
       {name:'Ihwa Mural Village',emoji:'🎨',duration:45,activity:'Climb the narrow hillside alleys of this artsy neighborhood covered in murals. The famous "Stairway Fish" mural and secret rooftop cafés make the climb worthwhile.',travelNote:'Walk down to Ikseon-dong (25 min) or take bus.',travelToNext:25},
       {name:'Ikseon-dong Hanok Village',emoji:'🏮',duration:60,activity:'Seoul\'s trendiest neighborhood — 100-year-old hanok houses converted to specialty coffee shops, craft cocktail bars, and Korean dessert cafés. The alleyways are magical at night.',travelNote:'Take subway Line 4 to Noryangjin.',travelToNext:20},
       {name:'Noryangjin Fish Market',emoji:'🦀',duration:75,activity:'Pick live seafood — abalone, king crab, sea urchin — at auction prices from vendors on the lower floor, then carry it to a restaurant upstairs to have it cooked.',travelNote:'Take subway to Hongdae or Sinchon for dinner.',travelToNext:20},
       {name:'Sinchon & Yonsei University Area',emoji:'🍜',duration:90,activity:'End the day bar-hopping in this lively student neighborhood. Try Korean fried chicken (Kyochon or Goobne), makgeolli rice wine, and street tteokbokki.',travelNote:'',travelToNext:0}]
    ],
    'hong kong':[
      [{name:'Victoria Peak Tram & View',emoji:'🏔️',duration:90,activity:'Ride the historic funicular up the steep mountainside, then walk the Peak Circle Trail for 360° views of the harbor, Kowloon, and Lantau Island.',travelNote:'Take the Peak Tram down and Star Ferry across from Central Pier.',travelToNext:30},
       {name:'Star Ferry Harbour Crossing',emoji:'⛴️',duration:30,activity:'Cross Victoria Harbour on the legendary Star Ferry — one of the world\'s great harbour views, passing container ships and junks for just HK$3.40.',travelNote:'Walk along Tsim Sha Tsui Promenade to the Avenue of Stars.',travelToNext:10},
       {name:'Avenue of Stars & Waterfront',emoji:'✨',duration:45,activity:'Stroll the Kowloon waterfront promenade with views of the HK Island skyline. Pose with Bruce Lee\'s bronze statue and watch the Symphony of Lights laser show at 8 PM.',travelNote:'Take MTR to Jordan, walk to Temple Street.',travelToNext:15},
       {name:'Temple Street Night Market',emoji:'🏮',duration:90,activity:'Browse the Kowloon night market for counterfeit watches, jade, and street food. The Cantonese opera singers near the Tin Hau temple perform nightly.',travelNote:'Take Ngong Ping 360 cable car to Lantau — take MTR to Tung Chung.',travelToNext:40},
       {name:'Tian Tan Big Buddha',emoji:'🙏',duration:150,activity:'Ride the scenic cable car over lush hills, then climb 268 steps to the 34m bronze seated Buddha on Lantau Island. The Po Lin Monastery below serves vegetarian lunch.',travelNote:'',travelToNext:0}],
      [{name:'Dragon\'s Back Hike',emoji:'🥾',duration:120,activity:'Hike the most scenic trail in Hong Kong — a ridge walk along the "spine" of Hong Kong Island with sea views on both sides, ending at Shek O Beach.',travelNote:'Take bus 9 or taxi from Shek O to Mong Kok (40 min).',travelToNext:45},
       {name:'Mong Kok Ladies\' & Flower Market',emoji:'👜',duration:75,activity:'Browse the Ladies\' Market for knock-offs and souvenirs, then walk to the Flower Market Road — hundreds of stalls selling fresh blooms, bonsai trees, and goldfish.',travelNote:'Walk to Langham Place, take MTR to Aberdeen.',travelToNext:25},
       {name:'Aberdeen Fishing Village',emoji:'⛵',duration:60,activity:'Hire a sampan boat tour to weave between hundreds of houseboats where families have lived on the water for generations. The floating Jumbo Kingdom area is nearby.',travelNote:'Take MTR from Wong Chuk Hang to Admiralty (10 min).',travelToNext:20},
       {name:'Wan Chai Night Food Tour',emoji:'🍢',duration:90,activity:'Eat at the Wan Chai street hawkers — clay pot rice, beef brisket noodles, and pineapple buns from old-school Cantonese bakeries that close by 9 PM.',travelNote:'Walk to Wan Chai rooftop bars (5 min).',travelToNext:5},
       {name:'Hong Kong Rooftop Bar Sunset',emoji:'🍸',duration:75,activity:'Watch the city light up from the Sevva rooftop at Prince\'s Building, or Zuma at the Landmark — the Victoria Harbour backdrop at blue hour is unforgettable.',travelNote:'',travelToNext:0}]
    ],
    taipei:[
      [{name:'Taipei 101 Observatory',emoji:'🏙️',duration:90,activity:'Ride the world\'s fastest elevator (60 floors in 37 seconds) to the 89th-floor indoor deck, then continue to the outdoor 91st floor. The damper ball on floor 88 is fascinating.',travelNote:'Take MRT Red Line to Jiantan, walk to Shilin Night Market (25 min).',travelToNext:30},
       {name:'Shilin Night Market',emoji:'🍢',duration:90,activity:'Taiwan\'s largest night market — try oyster vermicelli soup, stinky tofu, scallion pancakes, and the legendary XXL fried chicken. Queue at Shida for bubble tea.',travelNote:'Take MRT Red Line back south to Jiantan, transfer to Danshui-Xinyi line to NTU.',travelToNext:20},
       {name:'National Palace Museum',emoji:'🏛️',duration:90,activity:'See one of the world\'s greatest collections of Chinese imperial art — including the famous Jade Cabbage and Meat-shaped Stone carved from jasper, each the size of a fist.',travelNote:'Take bus 304 to Chiang Kai-shek Memorial.',travelToNext:30},
       {name:'Jiufen Old Street',emoji:'☕',duration:120,activity:'Wind up the lantern-lit stone stairways of this former gold-mining village clinging to a mountain above the sea. The teahouses here inspired the bathhouse in Spirited Away.',travelNote:'Take bus or shuttle from Ruifang Station back to Taipei (40 min).',travelToNext:45},
       {name:'Ximending Shopping District',emoji:'🛍️',duration:75,activity:'Browse the "Harajuku of Taipei" — neon-lit pedestrian streets with Taiwanese fashion, K-pop stores, and one of the densest concentrations of bubble tea shops on earth.',travelNote:'',travelToNext:0}],
      [{name:'Chiang Kai-shek Memorial Hall',emoji:'🏛️',duration:60,activity:'Watch the precision honor guard changing ceremony (every 2 hrs from 9 AM) in the grand neoclassical hall and stroll the enormous Liberty Square.',travelNote:'Walk through 2-28 Peace Memorial Park to Da\'an Forest Park.',travelToNext:15},
       {name:'Da\'an Forest Park',emoji:'🌳',duration:45,activity:'Relax in Taipei\'s Central Park equivalent — locals practice tai chi, play badminton, and tend community gardens. The amphi theater often has free weekend performances.',travelNote:'Walk 5 min to Yongkang Street.',travelToNext:5},
       {name:'Yongkang Street Food',emoji:'🍜',duration:75,activity:'This small street is Taipei\'s culinary heart — queue at Din Tai Fung for xiao long bao, or try 45-year-old beef noodle shops and shaved ice dessert at Ice Monster.',travelNote:'Take MRT to Xinbeitou Station for hot springs (20 min).',travelToNext:25},
       {name:'Beitou Hot Springs',emoji:'♨️',duration:120,activity:'Soak in the volcanic sulfur springs in the Beitou Hot Spring Museum\'s public pools, or pay for a private room at Spring City Resort with city views.',travelNote:'Take MRT from Xinbeitou back and then Danshui Line to Tamsui (45 min).',travelToNext:50},
       {name:'Tamsui Old Street & Riverfront',emoji:'🌅',duration:90,activity:'Stroll the historic town by the Taiwan Strait, famous for iron egg snacks, agei stuffed tofu, and fish balls. The sunset over the strait from Fisherman\'s Wharf is spectacular.',travelNote:'',travelToNext:0}]
    ],
    phuket:[
      [{name:'Big Buddha & Chalong Temple',emoji:'🙏',duration:90,activity:'Drive up Nakkerd Hill to the 45m marble Big Buddha with island-wide views, then visit Wat Chalong — the most important Buddhist temple in Phuket, with ancient murals.',travelNote:'Hire a songthaew or taxi 30 min west to Patong.',travelToNext:30},
       {name:'Patong Beach & Bangla Road',emoji:'🏖️',duration:90,activity:'Swim and sunbathe on Phuket\'s most famous (and lively) beach, then walk Bangla Road as the bars and clubs begin opening at sunset.',travelNote:'Hire driver 40 min south to Promthep Cape.',travelToNext:40},
       {name:'Promthep Cape Sunset',emoji:'🌅',duration:60,activity:'Join the crowd at Phuket\'s southernmost point for what many consider Southeast Asia\'s best sunset — orange light over the Andaman Sea, island silhouettes, fishing boats.',travelNote:'Take speedboat from Rassada Pier or join a day tour.',travelToNext:60},
       {name:'Phi Phi Islands Day Trip',emoji:'🏝️',duration:240,activity:'Snorkel the crystal-clear waters of Maya Bay (from The Beach film), explore Viking Cave, and kayak through sea caves on Phi Phi Leh. Snorkeling gear included.',travelNote:'Return speedboat to Phuket (45 min), taxi to Kata area.',travelToNext:60},
       {name:'Kata Beach Evening',emoji:'🌊',duration:90,activity:'Swim in the calmer Kata Beach waters as the day cools, then walk to Kata Night Market for grilled seafood, Thai massage, and handmade souvenirs at local prices.',travelNote:'',travelToNext:0}],
      [{name:'Phuket Old Town',emoji:'🏘️',duration:90,activity:'Explore the beautifully preserved Sino-Portuguese shophouse architecture along Thalang Road. Browse boutique shops, colorful murals, and Kopitiam coffee shops.',travelNote:'Take songthaew 20 min south to Wat Chalong.',travelToNext:20},
       {name:'Wat Chalong & Monkey Hill',emoji:'⛩️',duration:75,activity:'Explore the ornate multi-tiered Wat Chalong temple complex, then take the road up Monkey Hill where macaques roam free and views of Phuket town spread below.',travelNote:'Hire taxi 40 min north to Kamala Beach.',travelToNext:40},
       {name:'Surin & Kamala Beach',emoji:'🏄',duration:120,activity:'Swim at tranquil Surin Beach — cleaner and less crowded than Patong. Try a pineapple fried rice served inside a carved pineapple from beachside restaurants.',travelNote:'Take longtail boat 30 min north to Freedom Beach.',travelToNext:30},
       {name:'Freedom Beach Escape',emoji:'🌴',duration:90,activity:'Reach this hidden beach only accessible by boat or a steep trail. Crystal-clear turquoise water, no jet-skis, and just a handful of vendors — pure paradise.',travelNote:'Longtail back, taxi to Phuket Night Market (45 min).',travelToNext:50},
       {name:'Phuket Night Market',emoji:'🛍️',duration:75,activity:'The Saturday Night Market on Chao Fa Road is a local affair — Tom Yum soup, pad krapow, barbecued pork skewers, and Thai desserts at a fraction of tourist prices.',travelNote:'',travelToNext:0}]
    ],
    'siem reap':[
      [{name:'Angkor Wat Sunrise',emoji:'⛩️',duration:150,activity:'Arrive before 5:30 AM to watch the sky turn pink over the world\'s largest religious monument. Explore the outer galleries of carved bas-reliefs depicting 900-year-old battle scenes.',travelNote:'Tuk-tuk 10 min north to Angkor Thom.',travelToNext:10},
       {name:'Angkor Thom & Bayon',emoji:'🗿',duration:90,activity:'Enter through the South Gate past stone giants, then stand among the 216 giant stone faces of the Bayon temple — the most mysterious and photogenic of all temples.',travelNote:'Walk 5 min east inside the Angkor Thom complex.',travelToNext:5},
       {name:'Ta Prohm (Tomb Raider Temple)',emoji:'🌿',duration:75,activity:'Walk through the iconic temple where massive tree roots engulf stone walls and doorways — left deliberately uncleaned to show how nature reclaims ancient cities.',travelNote:'Tuk-tuk 20 min to Banteay Kdei and Srah Srang.',travelToNext:20},
       {name:'Srah Srang Reservoir',emoji:'💧',duration:45,activity:'Watch the golden afternoon light reflect on this ancient royal bathing reservoir. The stone landing with lion and garuda sculptures is the best photo spot.',travelNote:'Tuk-tuk 30 min back to town, walk Pub Street.',travelToNext:30},
       {name:'Pub Street Night Market',emoji:'🍻',duration:90,activity:'Join backpackers and locals on the lively Pub Street for Angkor draft beer, amok curry, fish with kampot pepper, and the famous fried crickets if you dare.',travelNote:'',travelToNext:0}],
      [{name:'Banteay Srei Pink Temple',emoji:'🌸',duration:90,activity:'Journey 35 km north to the "Citadel of Women" — the most intricately carved temple in all of Angkor, built from pink sandstone with delicate, precise reliefs.',travelNote:'Tuk-tuk 45 min east through jungle to Beng Mealea.',travelToNext:45},
       {name:'Beng Mealea Jungle Temple',emoji:'🌿',duration:90,activity:'Explore this completely unrestored temple engulfed by jungle — no walkways, tourists balance on fallen stones among fig trees and thick roots. Feels like genuine discovery.',travelNote:'Tuk-tuk 30 min south to Kampong Khleang floating village.',travelToNext:30},
       {name:'Tonle Sap Floating Village',emoji:'🚣',duration:90,activity:'Boat through a village built entirely on stilts over Southeast Asia\'s largest freshwater lake. Houses, schools, and temples all float. Fish farming cages fill the water below.',travelNote:'Return by tuk-tuk to Siem Reap town center (45 min).',travelToNext:45},
       {name:'Artisans Angkor Silk Farm',emoji:'🧵',duration:60,activity:'Watch weavers hand-produce traditional Khmer silk on ancient wooden looms, then browse the beautiful scarves, wall hangings, and lacquerware produced on-site.',travelNote:'Walk 10 min to Old Market area.',travelToNext:10},
       {name:'Old Market & Apsara Dance Show',emoji:'💃',duration:120,activity:'Shop the old market for spices, krama scarves, and silver, then attend a traditional Apsara dance dinner show featuring hand-gesture-based classical Khmer court dance.',travelNote:'',travelToNext:0}]
    ],
    paris:[
      [{name:'Eiffel Tower',emoji:'🗼',duration:120,activity:'Climb to the 2nd floor for city views, or book the summit in advance for the top. Have a crêpe at a nearby café and watch the tower\'s LED light show at 10 PM.',travelNote:'Take Metro Line 6 to Bir-Hakeim, then walk to Louvre (~25 min on foot along the Seine).',travelToNext:25},
       {name:'The Louvre',emoji:'🏛️',duration:150,activity:'See the Mona Lisa, Venus de Milo, and Winged Victory of Samothrace — the world\'s most visited museum. Use the Richelieu wing entrance to avoid the pyramid queue.',travelNote:'Walk 15 min east along Rue de Rivoli to Notre-Dame.',travelToNext:15},
       {name:'Notre-Dame Cathedral',emoji:'⛪',duration:75,activity:'Marvel at the rebuilt medieval cathedral and its intricate Gothic flying buttresses. Cross to Île Saint-Louis for Berthillon ice cream — the best in Paris.',travelNote:'Take Metro Line 4 north to Barbès-Rochechouart, walk up to Montmartre.',travelToNext:25},
       {name:'Montmartre & Sacré-Cœur',emoji:'🎨',duration:90,activity:'Climb to the white Sacré-Cœur basilica for panoramic Paris views, then wander the Place du Tertre where artists paint portraits, and find the wall of "Je t\'aime" in 300 languages.',travelNote:'Take Metro back to Champs-Élysées.',travelToNext:20},
       {name:'Champs-Élysées & Arc de Triomphe',emoji:'🏙️',duration:75,activity:'Walk the grand boulevard to the Arc de Triomphe, then climb to the roof of the Arc for a unique view of 12 avenues radiating outward from the roundabout.',travelNote:'',travelToNext:0}],
      [{name:'Musée d\'Orsay',emoji:'🖼️',duration:120,activity:'See the world\'s greatest Impressionist collection — Monet\'s water lilies, Renoir\'s dance scenes, and Van Gogh\'s self-portraits — inside a converted Belle Époque railway station.',travelNote:'Walk along the Seine 20 min to Le Marais.',travelToNext:20},
       {name:'Le Marais & Place des Vosges',emoji:'☕',duration:75,activity:'Wander the Jewish quarter\'s medieval streets, browse concept stores and galleries, then sit in the arcaded Place des Vosges — Paris\'s oldest planned square, built 1612.',travelNote:'Walk 10 min south to the Sainte-Chapelle.',travelToNext:10},
       {name:'Sainte-Chapelle',emoji:'🌈',duration:60,activity:'Step inside the most beautiful Gothic church in the world — 15 meters of floor-to-ceiling stained glass in 1,113 panels telling the Biblical story in color-saturated light.',travelNote:'Take RER B to Luxembourg Gardens.',travelToNext:15},
       {name:'Luxembourg Gardens',emoji:'🌷',duration:60,activity:'Stroll the formal French garden around the 17th-century palace, rent a toy sailboat to push on the octagonal pond, or just sit in a metal chair watching Parisians relax.',travelNote:'Walk 10 min to Saint-Germain-des-Prés.',travelToNext:10},
       {name:'Saint-Germain Café Evening',emoji:'☕',duration:90,activity:'Sip a café crème at Les Deux Magots or Café de Flore where Sartre and de Beauvoir once argued philosophy. Browse the Boulevard Saint-Germain bookshops.',travelNote:'',travelToNext:0}],
      [{name:'Palace of Versailles',emoji:'🏰',duration:240,activity:'Visit the Hall of Mirrors, the King\'s State Apartments, and the impossibly grand Baroque gardens. Book the Grand Trianon timed entry to skip the longest queue.',travelNote:'Take RER C from Versailles-Château to Saint-Michel, then walk to Latin Quarter.',travelToNext:45},
       {name:'Latin Quarter & Shakespeare & Co',emoji:'📚',duration:75,activity:'Browse Shakespeare and Company — the legendary English-language bookshop where Hemingway and Joyce once read — then explore the medieval Rue de la Huchette.',travelNote:'Walk 20 min east or Metro to Grands Boulevards.',travelToNext:20},
       {name:'Covered Passages',emoji:'🛍️',duration:60,activity:'Explore Galerie Vivienne and Passage des Panoramas — beautiful 19th-century glass-roofed arcades full of antique dealers, rare stamp shops, and atmospheric bistros.',travelNote:'Take Metro 3 to Père Lachaise cemetery.',travelToNext:20},
       {name:'Père Lachaise Cemetery',emoji:'🌿',duration:75,activity:'Wander the city of the dead searching for Oscar Wilde, Jim Morrison, Edith Piaf, and Marcel Proust among the Gothic mausoleums and tree-lined cobblestone lanes.',travelNote:'Metro to Canal Saint-Martin.',travelToNext:20},
       {name:'Canal Saint-Martin',emoji:'🛶',duration:60,activity:'Stroll the iron footbridges and tree-lined banks of this romantic canal, watching barges lock through while locals picnic on the quayside with rosé and baguettes.',travelNote:'',travelToNext:0}]
    ],
    rome:[
      [{name:'Colosseum & Roman Forum',emoji:'🏛️',duration:150,activity:'Enter the 2,000-year-old arena where gladiators fought, then walk through the Via Sacra of the Roman Forum past the Arch of Titus and Temple of Saturn.',travelNote:'Walk 20 min northwest through the centro storico to Trevi Fountain.',travelToNext:20},
       {name:'Trevi Fountain',emoji:'💫',duration:45,activity:'Toss a coin over your shoulder with your right hand into the Baroque fountain to guarantee your return to Rome — the city collects €3,000 per day from the pool.',travelNote:'Walk 10 min northwest to the Spanish Steps.',travelToNext:10},
       {name:'Spanish Steps & Villa Borghese',emoji:'🌺',duration:60,activity:'Climb the 135 steps to the Trinità dei Monti church, then enter the Villa Borghese gardens — Rome\'s Central Park — for a lake, statues, and a free puppet theater.',travelNote:'Take Bus 40 or 64 to Piazza Navona.',travelToNext:20},
       {name:'Piazza Navona',emoji:'🎭',duration:60,activity:'Admire Bernini\'s Fountain of the Four Rivers at the center of this stunning oval Baroque piazza built over Domitian\'s stadium. Outdoor artists perform here nightly.',travelNote:'Walk 10 min east to Campo de\' Fiori.',travelToNext:10},
       {name:'Campo de\' Fiori Evening',emoji:'🍕',duration:90,activity:'Join locals at this lively square where the morning flower market gives way to evening aperitivo. Try Da Renzo for cacio e pepe or Forno Campo de\' Fiori for pizza bianca.',travelNote:'',travelToNext:0}],
      [{name:'Vatican Museums & Sistine Chapel',emoji:'🎨',duration:180,activity:'Walk the Gallery of Maps, the Raphael Rooms, and finally the Sistine Chapel to see Michelangelo\'s Creation of Adam ceiling and The Last Judgment wall — book timed entry.',travelNote:'Walk 10 min east to St. Peter\'s Basilica.',travelToNext:10},
       {name:'St. Peter\'s Basilica',emoji:'⛪',duration:75,activity:'Climb the dome (551 steps or elevator halfway) for Rome\'s highest view. Inside, find Michelangelo\'s Pietà, Bernini\'s bronze baldachin, and the crypt of the Popes.',travelNote:'Walk 15 min east along Via della Conciliazione to Castel Sant\'Angelo.',travelToNext:15},
       {name:'Castel Sant\'Angelo',emoji:'🏰',duration:75,activity:'Cross the bridge flanked by Bernini\'s angels and climb the circular fortress — originally Hadrian\'s Mausoleum — for panoramic views of the Tiber and St. Peter\'s dome.',travelNote:'Walk or take taxi 15 min east to Trastevere neighborhood.',travelToNext:20},
       {name:'Trastevere',emoji:'🍷',duration:90,activity:'Explore Rome\'s most romantic medieval neighborhood at dusk — labyrinthine cobblestone alleys, ivy-draped facades, and trattorias with tables spilling into lamplight piazzas.',travelNote:'Walk 15 min back north toward the Jewish Ghetto.',travelToNext:15},
       {name:'Jewish Ghetto & Portico d\'Ottavia',emoji:'🏛️',duration:60,activity:'Stand among the ancient columns of the 2,000-year-old Portico d\'Ottavia, then browse the adjacent Jewish bakeries for ricotta-and-cherry tarts and artichoke alla giudia.',travelNote:'',travelToNext:0}],
      [{name:'Borghese Gallery',emoji:'🖼️',duration:90,activity:'See Bernini\'s breathtaking marble sculptures — Apollo and Daphne, the Rape of Proserpina — in the villa that houses one of Rome\'s finest private art collections. Book weeks ahead.',travelNote:'Walk 30 min through Villa Borghese park to Testaccio.',travelToNext:35},
       {name:'Testaccio Market & Food Tour',emoji:'🍴',duration:90,activity:'Rome\'s most authentic food market — try supplì rice balls, offal sandwich (lampredotto), fresh pasta, and the city\'s best pizza al taglio from Forno Roscioli.',travelNote:'Walk 20 min along the Tiber to Ostiense.',travelToNext:20},
       {name:'Ostiense & Street Art District',emoji:'🎨',duration:60,activity:'Explore the former industrial zone now covered in some of Rome\'s best street art murals, then visit the Pyramid of Cestius — an actual ancient Roman pyramid.',travelNote:'Take tram or taxi to Pigneto (20 min).',travelToNext:20},
       {name:'Pigneto Neighborhood',emoji:'🍺',duration:75,activity:'Join Rome\'s young creative crowd in this hip working-class neighborhood for aperitivo hour (Necci dal 1924 is legendary) and affordable trattorias beloved by locals.',travelNote:'',travelToNext:0}]
    ],
    barcelona:[
      [{name:'Sagrada Família',emoji:'⛪',duration:120,activity:'Stand beneath Gaudí\'s under-construction-for-143-years cathedral with its extraordinary stone towers. The interior\'s colored light through the stained glass is transcendent — book online.',travelNote:'Take Metro L2/L3 to Passeig de Gràcia for Casa Batlló (15 min).',travelToNext:15},
       {name:'Casa Batlló',emoji:'🦎',duration:60,activity:'Tour Gaudí\'s dragon-scaled building — described as "the house of bones" — with a shimmering mosaic facade and undulating interior spaces that feel like being inside a creature.',travelNote:'Walk 5 min north to Park Güell (or take taxi 15 min uphill).',travelToNext:15},
       {name:'Park Güell',emoji:'🌈',duration:90,activity:'Explore Gaudí\'s colorful mosaic terrace and the Monumental Zone\'s gingerbread gatehouses. The terrace dragon fountain is one of the most photographed works in the world.',travelNote:'Take Metro L3 to Liceu, walk to Gothic Quarter.',travelToNext:25},
       {name:'Gothic Quarter',emoji:'🏛️',duration:75,activity:'Wind through the medieval streets around the Barcelona Cathedral, find the 2,000-year-old Roman Temple of Augustus hidden in a courtyard, and explore El Call, the old Jewish quarter.',travelNote:'Walk 10 min north to La Boqueria.',travelToNext:10},
       {name:'La Boqueria & La Rambla',emoji:'🍊',duration:60,activity:'Browse Mercat de Sant Josep\'s stalls piled with Iberian ham legs, candy-colored fruit cups, and fresh seafood. Exit onto La Rambla for a stroll down Barcelona\'s famous tree-lined boulevard.',travelNote:'',travelToNext:0}],
      [{name:'Barceloneta Beach',emoji:'🏖️',duration:90,activity:'Swim in the warm Mediterranean off Barcelona\'s urban beach, then walk the wooden boardwalk past chiringuito beach bars for a mid-morning mojito and fresh seafood.',travelNote:'Walk 30 min north to El Born neighborhood.',travelToNext:30},
       {name:'Picasso Museum',emoji:'🎨',duration:90,activity:'See one of the most comprehensive collections of Picasso\'s early work in the medieval palaces of El Born — especially the Las Meninas variations from 1957.',travelNote:'Walk 10 min to El Born cultural center.',travelToNext:10},
       {name:'El Born & Santa Maria del Mar',emoji:'☕',duration:60,activity:'Explore the hip El Born neighborhood\'s boutiques and cocktail bars around the stunning Gothic Church of Santa Maria del Mar — built by the people of the Ribera district.',travelNote:'Take Metro L4 to Urquinaona, walk 10 min to Palau de la Música.',travelToNext:15},
       {name:'Palau de la Música Catalana',emoji:'🎶',duration:60,activity:'Marvel at this UNESCO World Heritage concert hall — Domènech i Montaner\'s Modernisme masterpiece with an extraordinary stained-glass skylight blooming overhead like a flower.',travelNote:'Walk back toward Barceloneta pier for sunset.',travelToNext:20},
       {name:'Port Olímpic Sunset & Tapas',emoji:'🌅',duration:90,activity:'Watch the sun set over the marina backed by the Frank Gehry golden fish sculpture, then find a terrace bar for patatas bravas, pan con tomate, and cava.',travelNote:'',travelToNext:0}]
    ],
    london:[
      [{name:'Tower Bridge & Tower of London',emoji:'🏰',duration:120,activity:'Walk across Tower Bridge\'s glass-floor high-level walkway, then explore the Tower of London where you\'ll find the Crown Jewels and the famous Beefeater guides.',travelNote:'Walk 10 min west along the Thames to Borough Market.',travelToNext:10},
       {name:'Borough Market',emoji:'🍞',duration:60,activity:'London\'s oldest food market — graze on Scotch eggs, Montgomery cheddar, Ethiopian injera, and salt-beef bagels. The Neal\'s Yard Dairy cheese counter alone is worth the trip.',travelNote:'Walk over Millennium Bridge (5 min) to Tate Modern.',travelToNext:5},
       {name:'Tate Modern & Bankside',emoji:'🖼️',duration:90,activity:'Explore the free world-class modern art collection in the converted Bankside Power Station. The Turbine Hall installations are often spectacular and always free.',travelNote:'Walk across Millennium Bridge to St Paul\'s.',travelToNext:5},
       {name:'St Paul\'s Cathedral',emoji:'⛪',duration:60,activity:'Climb to the Golden Gallery at the top of Wren\'s dome for the best view over the City of London, or stand in the Whispering Gallery where sounds travel 34m along the walls.',travelNote:'Walk 15 min along the Embankment to Southbank.',travelToNext:15},
       {name:'Southbank & Royal Festival Hall',emoji:'🌃',duration:60,activity:'Stroll the liveliest stretch of riverfront in London — second-hand book market under Waterloo Bridge, street performers, and a glass of wine at the Festival Hall terrace bar.',travelNote:'',travelToNext:0}],
      [{name:'Buckingham Palace & The Mall',emoji:'🏰',duration:60,activity:'Watch the Changing of the Guard ceremony (check times, usually 11 AM) and walk The Mall lined with flags to St James\'s Park with its pelicans and Duck Island.',travelNote:'Walk through Green Park to Hyde Park (15 min).',travelToNext:15},
       {name:'Hyde Park & Kensington Gardens',emoji:'🌳',duration:75,activity:'Rent a pedal boat on the Serpentine, visit the Diana Memorial Fountain, and walk through the Italian Gardens to the ornate Albert Memorial.',travelNote:'Walk 10 min to Natural History Museum.',travelToNext:10},
       {name:'Natural History Museum',emoji:'🦕',duration:90,activity:'Free entry to one of the world\'s great museums — the blue whale skeleton in the Hintze Hall is awe-inspiring, and the Vault room has a 562-carat emerald and a meteorite you can touch.',travelNote:'Walk 15 min east to Harrods.',travelToNext:15},
       {name:'Harrods & Knightsbridge',emoji:'🛍️',duration:60,activity:'Wander the extravagant food halls on the ground floor — Harrods sells 100 varieties of jam and an entire hall dedicated to chocolate. The Egyptian escalator is a spectacle.',travelNote:'Take the tube (District Line) to Notting Hill Gate.',travelToNext:20},
       {name:'Notting Hill & Portobello Road',emoji:'🎨',duration:75,activity:'Browse the antiques, vintage records, and street food of Portobello Road Market (biggest on Saturdays). Walk the pastel-colored mews houses and find the travel bookshop.',travelNote:'',travelToNext:0}],
      [{name:'Greenwich Royal Observatory',emoji:'🔭',duration:90,activity:'Straddle the Prime Meridian line at 0° longitude, see the 19th-century telescope domes, and enjoy the steep park hill\'s panoramic view of Canary Wharf and the City.',travelNote:'Take DLR or Thames Clipper back to central London.',travelToNext:30},
       {name:'Shoreditch Street Art & Markets',emoji:'🎨',duration:75,activity:'Walk the Brick Lane and Shoreditch walls — the most concentrated outdoor gallery in Europe. Old Spitalfields Market and Boxpark Shoreditch are nearby for lunch.',travelNote:'Take Overground to Camden Town.',travelToNext:25},
       {name:'Camden Market',emoji:'🎶',duration:90,activity:'Browse 1,000 stalls in a labyrinthine Victorian railway market selling street food, vintage clothing, and independent design. The Stables Market and Lock Market are the best sections.',travelNote:'Take Northern Line to Bank, then walk to Sky Garden.',travelToNext:25},
       {name:'Sky Garden',emoji:'🌿',duration:60,activity:'Free entry (pre-book online) to a stunning public garden on the top floors of 20 Fenchurch Street ("The Walkie-Talkie") — three floors of tropical plants with 360° London views.',travelNote:'Take tube or walk to your dinner reservation.',travelToNext:15},
       {name:'Borough Yards & Bermondsey',emoji:'🍷',duration:75,activity:'Explore the new Borough Yards development for its excellent restaurants, or head to Bermondsey Wine Walk on Saturdays when 30+ wineries open their railway arch cellars.',travelNote:'',travelToNext:0}]

    amsterdam:[
      [{name:'Rijksmuseum',emoji:'🖼️',duration:120,activity:'See Rembrandt\'s Night Watch and Vermeer\'s Milkmaid in the magnificent national museum — the I Amsterdam letters are no longer there, but the gardens still are.',travelNote:'Walk 5 min north to Van Gogh Museum.',travelToNext:5},
       {name:'Van Gogh Museum',emoji:'🎨',duration:90,activity:'Follow Van Gogh\'s artistic journey from dark early Dutch works to vibrant Arles sunflowers and the turbulent Saint-Rémy asylum paintings — the world\'s largest collection.',travelNote:'Walk 20 min north through Vondelpark to Anne Frank House.',travelToNext:25},
       {name:'Anne Frank House',emoji:'🏠',duration:75,activity:'Walk through the hidden annex where Anne Frank and seven others hid for 761 days. The museum includes her original diary pages and videos from surviving family members.',travelNote:'Walk 10 min east into the Jordaan neighborhood.',travelToNext:10},
       {name:'Jordaan Canal Walk',emoji:'🛶',duration:75,activity:'Stroll the intimate neighborhood of narrow canals, 17th-century merchant houses, and independent cheese and flower shops. Rent a canal bike for the quintessential Amsterdam experience.',travelNote:'Walk 20 min back south to Leidseplein.',travelToNext:20},
       {name:'Leidseplein & Heineken',emoji:'🍺',duration:90,activity:'Join locals at the lively square\'s café terraces for bitterballen and Dutch beer, then check if Paradiso music venue has a show — it\'s one of Europe\'s great concert churches.',travelNote:'',travelToNext:0}],
      [{name:'Albert Cuyp Market',emoji:'🧀',duration:60,activity:'Browse Amsterdam\'s largest street market — try Dutch stroopwafels fresh from the iron, raw herring with onion and pickles (the Dutch way), and Gouda straight from the wheel.',travelNote:'Walk or cycle 20 min to Heineken Experience.',travelToNext:20},
       {name:'Heineken Experience',emoji:'🍺',duration:90,activity:'Tour the original 1867 brewery where Heineken was born — interactive stations, a bottle-filling line, and a stable where the famous Heineken Horses still live (and get petted).',travelNote:'Walk 15 min east to the NEMO Science Museum.',travelToNext:15},
       {name:'NEMO Science Museum',emoji:'🔬',duration:75,activity:'Explore five floors of hands-on science exhibits, then climb to the free roof terrace — one of Amsterdam\'s best city views looking across the harbor and rooftops.',travelNote:'Walk along the waterfront to De Pijp district (25 min).',travelToNext:25},
       {name:'De Pijp & Sarphatipark',emoji:'☕',duration:60,activity:'Browse the multicultural Pijp neighborhood\'s independent restaurants from Surinamese to Moroccan, and relax in Sarphatipark — smaller and more local than Vondelpark.',travelNote:'Book a canal cruise from near Centraal Station.',travelToNext:30},
       {name:'Evening Canal Cruise',emoji:'🛶',duration:75,activity:'Float through Amsterdam\'s UNESCO canal ring at golden hour — 165 canals, 1,281 bridges, and rows of tilting gabled houses perfectly reflected in the water.',travelNote:'',travelToNext:0}]

    prague:[
      [{name:'Prague Castle Complex',emoji:'🏰',duration:150,activity:'Walk through the largest ancient castle complex in the world — St. Vitus Cathedral with its Gothic spires, the Old Royal Palace, and the Golden Lane of tiny medieval artisan homes.',travelNote:'Walk down through Malá Strana to Charles Bridge (20 min).',travelToNext:20},
       {name:'Charles Bridge & Malá Strana',emoji:'🌉',duration:75,activity:'Cross the 14th-century stone bridge lined with 30 Baroque saint statues. Touch the bronze plaque on St. John of Nepomuk for good luck, then explore the Little Quarter below.',travelNote:'Walk 20 min east through Old Town to the Astronomical Clock.',travelToNext:20},
       {name:'Old Town Square & Astronomical Clock',emoji:'⏰',duration:60,activity:'Watch the medieval astronomical clock\'s mechanical parade of figures strike on the hour, then explore the beautiful Romanesque and Gothic Old Town Square.',travelNote:'Walk 10 min north to the Jewish Quarter.',travelToNext:10},
       {name:'Jewish Quarter (Josefov)',emoji:'🕍',duration:75,activity:'Visit the Old Jewish Cemetery — 12,000 graves in 12 layers, the headstones jostling for space — and the 13th-century Old-New Synagogue, the oldest active synagogue in Europe.',travelNote:'Walk 20 min to Wenceslas Square.',travelToNext:20},
       {name:'Wenceslas Square & Vinohrady',emoji:'🌃',duration:60,activity:'Walk the 750m boulevard boulevard of Czech history from the 1968 uprising to 1989\'s Velvet Revolution, then head to the Vinohrady neighborhood for craft beer and dinner.',travelNote:'',travelToNext:0}],
      [{name:'Vyšehrad Fortress & Views',emoji:'🏯',duration:75,activity:'The less-visited castle fortress has even better views of the Vltava than Prague Castle. Wander the cemetery where Dvořák and Kafka are buried among Art Nouveau tombstones.',travelNote:'Walk down to Nusle Bridge neighborhood (20 min).',travelToNext:20},
       {name:'Cubist Architecture Walk',emoji:'🏛️',duration:45,activity:'See the only Cubist street lamp in the world, then find the extraordinary Black Madonna House — Prague invented its own unique form of Cubist architecture.',travelNote:'Take tram to Žižkov TV Tower (15 min).',travelToNext:15},
       {name:'Žižkov TV Tower',emoji:'📡',duration:60,activity:'Crawl between the giant baby statues climbing the brutalist communist-era TV tower. Take the lift to the bar/restaurant at the top for the highest view in Prague.',travelNote:'Walk through Žižkov to Vinohrady (20 min).',travelToNext:20},
       {name:'Vinohrady Wine Bar Afternoon',emoji:'🍷',duration:90,activity:'The most charming Prague neighborhood for a slow afternoon — Moravian wine bars, café-restaurant hybrids, and leafy boulevards of Art Nouveau apartment buildings.',travelNote:'Walk or tram to Letná Park (25 min).',travelToNext:25},
       {name:'Letná Park Beer Garden',emoji:'🌳',duration:75,activity:'Join Praguers at Europe\'s most scenic outdoor beer garden — cheap Czech pilsner, picnic tables under the trees, and a giant metronome ticking where Stalin\'s statue once stood.',travelNote:'',travelToNext:0}]
