    'new york':[
      [{name:'Central Park',emoji:'🌳',duration:90,activity:'Rent a bike to loop the 6-mile park road, visit Strawberry Fields\' Imagine mosaic, and boat on the Rowboat Lake — the park\'s skyline backdrop is one of the world\'s great views.',travelNote:'Walk east 10 min to the Metropolitan Museum.',travelToNext:10},
       {name:'Metropolitan Museum of Art',emoji:'🏛️',duration:120,activity:'Free entry with suggested donation. See the Egyptian Temple of Dendur, European Masters wing, and the American Wing. The rooftop garden has seasonal art and skyline views.',travelNote:'Take Subway 6 south to 42nd St / Times Square (15 min).',travelToNext:20},
       {name:'Times Square',emoji:'🌆',duration:60,activity:'Experience the neon sensory overload of 42nd Street and the LED billboards towering seven stories high. The TKTS booth sells Broadway tickets at 20-50% off same-day.',travelNote:'Take Subway A/C/E to 14th St, walk to the High Line.',travelToNext:20},
       {name:'The High Line',emoji:'🌿',duration:75,activity:'Walk the 1.45-mile elevated park built on a disused railway line through West Chelsea — the art installations, Hudson River views, and neighborhood perspectives are extraordinary.',travelNote:'Walk south to Chelsea Market.',travelToNext:10},
       {name:'Chelsea Market & Hudson Yards',emoji:'🍕',duration:90,activity:'Browse the food stalls at Chelsea Market in the old Nabisco factory, then walk to the Hudson Yards\' vessel (the climbable honeycomb sculpture) and The Shed arts center.',travelNote:'',travelToNext:0}],
      [{name:'Brooklyn Bridge Walk',emoji:'🌉',duration:60,activity:'Walk across the 140-year-old suspension bridge — Manhattan\'s financial district towers behind you, DUMBO\'s cobblestones ahead. Best views from the middle span.',travelNote:'Walk down to DUMBO neighborhood below the bridge.',travelToNext:10},
       {name:'DUMBO & Manhattan Bridge Views',emoji:'📸',duration:60,activity:'Find the iconic framed view of the Manhattan Bridge through Washington Street, browse the Empire Stores waterfront market, and pick up Grimaldi\'s pizza.',travelNote:'Take A/C or Subway F/G to Prospect Park.',travelToNext:20},
       {name:'Brooklyn Botanic Garden',emoji:'🌸',duration:90,activity:'52 acres of gardens including a Japanese hill-and-pond garden, a fragrance garden designed for the visually impaired, and 200 cherry trees spectacular in late April.',travelNote:'Walk 5 min to Prospect Park.',travelToNext:5},
       {name:'Prospect Park',emoji:'🌳',duration:60,activity:'Brooklyn\'s 526-acre answer to Central Park — designed by the same architects. Row on the lake, explore the Long Meadow, or visit the free Prospect Park Zoo.',travelNote:'Walk or Lyft to Smorgasburg (seasonal, Saturdays).',travelToNext:15},
       {name:'Smorgasburg Food Market',emoji:'🍔',duration:90,activity:'The largest open-air food market in America (Saturday, Prospect Park, or Sunday, Industry City) — 100 local vendors and the birthplace of the ramen burger and a thousand food trends.',travelNote:'',travelToNext:0}],
      [{name:'Statue of Liberty & Ellis Island',emoji:'🗽',duration:180,activity:'Take the ferry to Liberty Island and climb to the crown (book weeks ahead) or the pedestal for harbor views. Stop at Ellis Island museum to trace immigration history.',travelNote:'Ferry back to Battery Park, walk to 9/11 Memorial (15 min).',travelToNext:15},
       {name:'9/11 Memorial & Oculus',emoji:'🕊️',duration:90,activity:'Stand at the twin reflecting pools set in the footprints of the towers, then walk to the Oculus — Santiago Calatrava\'s dramatic white-rib transit hub that looks like a dove.',travelNote:'Walk to One World Observatory elevator (5 min).',travelToNext:5},
       {name:'One World Observatory',emoji:'🌆',duration:60,activity:'Ride to the 102nd floor of the Western Hemisphere\'s tallest building — the sky pod elevator plays a time-lapse of Manhattan\'s 500-year transformation during the ride up.',travelNote:'Walk 15 min north through Tribeca to Little Italy.',travelToNext:15},
       {name:'Little Italy & SoHo',emoji:'🍝',duration:90,activity:'Have lunch at Umberto\'s Clam House or Ferrara Bakery (since 1892) for cannoli, then walk into SoHo for cast-iron architecture, gallery hopping, and luxury shopping.',travelNote:'Take Subway 1 to Christopher Street or taxi.',travelToNext:15},
       {name:'Brooklyn Bridge Park Sunset',emoji:'🌅',duration:60,activity:'Watch the golden hour light illuminate the Manhattan skyline and Brooklyn Bridge from the grass lawns of Brooklyn Bridge Park — bring a picnic from nearby Time Out Market.',travelNote:'',travelToNext:0}]

    'los angeles':[
      [{name:'Griffith Observatory & Hollywood Sign',emoji:'🎬',duration:90,activity:'Drive or hike the Mt. Hollywood trail to the Griffith Observatory for telescopes, a free planetarium, and the best view of the Hollywood Sign and LA Basin.',travelNote:'Drive or Lyft 15 min west along Franklin to Hollywood Blvd.',travelToNext:15},
       {name:'Hollywood Walk of Fame',emoji:'⭐',duration:60,activity:'Find your favorite celebrity\'s star on the 2.6 km stretch of Hollywood Boulevard, pose at the hand and footprints at TCL Chinese Theatre, and visit the Dolby Theatre.',travelNote:'Drive or Lyft 20 min north on the 405 to the Getty.',travelToNext:20},
       {name:'The Getty Center',emoji:'🖼️',duration:120,activity:'Free entry to the hilltop museum with Monet, Rembrandt, and Van Gogh — but the real reason to visit is the travertine architecture, gardens, and 360° LA panorama.',travelNote:'Drive 20 min south on Lincoln Blvd to Venice Beach.',travelToNext:20},
       {name:'Venice Beach & Boardwalk',emoji:'🏄',duration:90,activity:'Rent a bike along the beach path, watch the muscle-bound lifters at Muscle Beach, and browse the boardwalk stalls of tie-dye, crystals, and street performers.',travelNote:'Walk or bike 4 miles north along the beach to Santa Monica.',travelToNext:30},
       {name:'Santa Monica Pier Sunset',emoji:'🎡',duration:75,activity:'Ride the Pacific Wheel Ferris wheel (the only solar-powered one on Earth) above the Pacific Ocean at golden hour, then walk the Third Street Promenade for dinner.',travelNote:'',travelToNext:0}],
      [{name:'Farmers Market & The Grove',emoji:'🍊',duration:75,activity:'Browse the 1934 Original Farmers Market\'s 100+ food stalls — try the fresh-squeezed orange juice, Cajun takeout, and the famous Bob\'s Coffee and Doughnuts.',travelNote:'Walk 5 min to LACMA.',travelToNext:5},
       {name:'LACMA & La Brea Tar Pits',emoji:'🦴',duration:90,activity:'See 130,000 years of asphalt-preserved fossils at the La Brea Tar Pits (mammoths still being excavated!), then explore LACMA\'s Chris Burden Urban Light lamp forest.',travelNote:'Drive or Lyft 10 min north to Beverly Hills.',travelToNext:15},
       {name:'Beverly Hills & Rodeo Drive',emoji:'💎',duration:60,activity:'Walk the three-block luxury shopping street where every major fashion house has a flagship. The Two Rodeo cobblestone lane is Instagram gold. All free to browse.',travelNote:'Drive west on Melrose Ave (10 min).',travelToNext:10},
       {name:'Melrose Avenue Vintage',emoji:'👒',duration:75,activity:'Hunt through Wasteland, Decades, and the dozens of independent vintage shops that make Melrose a destination for celebrities sourcing wardrobe pieces.',travelNote:'Drive east to Silver Lake (20 min).',travelToNext:20},
       {name:'Silver Lake & Echo Park',emoji:'🌆',duration:90,activity:'Explore LA\'s hippest neighborhood for its record stores (Vacation Vinyl), natural wine bars, and the Echo Park Lake with the downtown skyline reflecting at dusk.',travelNote:'',travelToNext:0}]

    cancun:[
      [{name:'Chichen Itza Mayan Ruins',emoji:'🏛️',duration:240,activity:'Stand at the base of El Castillo pyramid — its shadow forms a serpent descending the stairs at equinox. Explore the Ball Court and the Sacred Cenote where jade offerings were found.',travelNote:'Walk 5 min to the Ik Kil Cenote (usually included in tour).',travelToNext:5},
       {name:'Ik Kil Sacred Cenote',emoji:'💦',duration:75,activity:'Swim in this breathtaking circular cenote — vines drape 26m down to the vivid blue underground pool where ancient Mayans made offerings to the rain god Chaac.',travelNote:'Return bus to Cancun Hotel Zone (2.5 hrs), walk Playa Delfines.',travelToNext:150},
       {name:'Playa Delfines & Hotel Zone',emoji:'🏖️',duration:120,activity:'The best free public beach in Cancun\'s Hotel Zone — no beach clubs, just open Caribbean sand and powerful waves. The giant Cancun sign here is the photo op.',travelNote:'Walk or taxi north along Blvd Kukulcán.',travelToNext:20},
       {name:'El Rey Mayan Ruins (in Hotel Zone)',emoji:'🏛️',duration:45,activity:'Walk the ruins of a Mayan trading post inside the Hotel Zone itself — iguanas outnumber tourists at this small but atmospheric site with 47 structures.',travelNote:'Taxi 20 min to Mercado 28.',travelToNext:20},
       {name:'Mercado 28 Evening',emoji:'🛍️',duration:75,activity:'Shop for genuine Mayan crafts, silver jewelry, hammocks, and embroidered clothing at prices far below the Hotel Zone. Eat a market dinner of cochinita pibil tacos.',travelNote:'',travelToNext:0}],
      [{name:'Isla Mujeres Day Trip',emoji:'⛵',duration:300,activity:'Ferry 20 min to the car-free island, rent a golf cart to circumnavigate in 30 min, swim at Playa Norte (one of Mexico\'s best beaches), and snorkel the MUSA underwater museum.',travelNote:'Ferry back to Cancun, arrange transport to Tulum (2 hrs south).',travelToNext:120},
       {name:'Tulum Cliffside Ruins',emoji:'🌴',duration:180,activity:'Explore the only Mayan city built overlooking the Caribbean Sea — El Castillo perches on a 12m cliff. Descend the stairs to swim the ruins\' private beach surrounded by ancient walls.',travelNote:'Hire driver to Cenote Dos Ojos (30 min).',travelToNext:30},
       {name:'Cenote Dos Ojos Snorkeling',emoji:'💧',duration:90,activity:'Snorkel through two interconnected underwater cave systems lit by shafts of blue light filtering through the crystal-clear water — the "two eyes" cenotes are otherworldly.',travelNote:'Driver back to Cancun Hotel Zone (2 hrs).',travelToNext:120},
       {name:'Cancun Hotel Zone Beach Clubs',emoji:'🍹',duration:120,activity:'Claim a sunbed at Mandala or Coco Bongo\'s day club on the Caribbean-facing beach — infinity pools, DJ sets, and access to the most vivid turquoise water in Mexico.',travelNote:'Walk or taxi to a sunset dinner spot.',travelToNext:20},
       {name:'Puerto Morelos Sunset Dinner',emoji:'🌅',duration:90,activity:'Drive 30 min south to the quiet fishing village of Puerto Morelos for fresh grouper ceviche and grilled lobster at waterfront restaurants with almost no tourists.',travelNote:'',travelToNext:0}]

    dubai:[
      [{name:'Burj Khalifa At the Top',emoji:'🏙️',duration:90,activity:'Ride the world\'s fastest elevator to level 124 or the premium level 148 for views across the desert, the Palm, and the Persian Gulf. The 124th floor has an open terrace.',travelNote:'Walk 5 min through the Dubai Mall to Dubai Fountain.',travelToNext:5},
       {name:'Dubai Mall & Dubai Fountain',emoji:'💧',duration:75,activity:'Watch the world\'s largest fountain choreographed to music on the Burj Lake at 6 PM and 10 PM, then browse the Dubai Mall\'s 1,200 stores and its indoor ice rink.',travelNote:'Take a taxi 20 min to Al Fahidi Historic District.',travelToNext:20},
       {name:'Al Fahidi Historic District & Dubai Frame',emoji:'🏛️',duration:90,activity:'Walk the wind-tower architecture of Dubai\'s 1800s pearl-diving neighborhood, then cross to the Dubai Frame — a 150m picture frame with Old Dubai on one side, New Dubai on the other.',travelNote:'Take a water taxi (abra) across Dubai Creek to Deira.',travelToNext:15},
       {name:'Dubai Creek Abra Ride & Souk',emoji:'⛵',duration:60,activity:'Cross the historic Creek on a wooden abra water taxi for AED 1, landing in Deira — home of the covered textile souk and the glittering Gold Souk with its 10 tonnes of displayed gold.',travelNote:'Walk 10 min to the Spice Souk.',travelToNext:10},
       {name:'Spice Souk & Creek Dinner',emoji:'🥘',duration:75,activity:'Browse sacks of cardamom, dried limes, saffron, and frankincense in this aromatic covered market, then dine on Al Fanar restaurant\'s Emirati machboos rice and luqaimat dumplings.',travelNote:'',travelToNext:0}],
      [{name:'Desert Safari & Dune Bashing',emoji:'🏜️',duration:300,activity:'A 4x4 deflates its tires and surfs up and down 50m red sand dunes at high speed — heart-pounding. Then watch the dunes turn crimson and gold at sunset.',travelNote:'Included transfer to the Bedouin camp (30 min).',travelToNext:30},
       {name:'Arabian Desert Camp Evening',emoji:'🔥',duration:120,activity:'Sit on cushions in a Bedouin tent for camel rides, henna painting, shisha, and a buffet of grilled meats and mezze under the stars to the sound of an oud player.',travelNote:'Included transfer back to Dubai (60 min).',travelToNext:60},
       {name:'Palm Jumeirah & Atlantis',emoji:'🏝️',duration:75,activity:'Take the Palm Monorail to the tip of the Palm and walk the Atlantic boardwalk — the view of the Dubai skyline from the Palm frond is the most dramatic in the city.',travelNote:'Taxi 20 min to Dubai Marina.',travelToNext:20},
       {name:'Dubai Marina Walk',emoji:'⚓',duration:90,activity:'Stroll the 7 km marina promenade lined with 200 skyscrapers, superyachts, and waterfront restaurants. Take an RTA water bus ride under the marina bridges.',travelNote:'Walk 10 min to JBR The Walk.',travelToNext:10},
       {name:'JBR Beach & The Walk',emoji:'🏖️',duration:75,activity:'Swim in the warm Persian Gulf on Jumeirah Beach Residence\'s public beach, then dine at any of 150+ restaurants along The Walk — a 1.7km open-air mall by the sea.',travelNote:'',travelToNext:0}]

    istanbul:[
      [{name:'Hagia Sophia',emoji:'🕌',duration:90,activity:'Stand beneath the 55m dome of the 537 AD Byzantine masterpiece — now a mosque but open to respectful visitors. The 6m tall 9th-century Virgin Mary mosaic is still visible.',travelNote:'Walk 5 min south to the Blue Mosque.',travelToNext:5},
       {name:'Sultan Ahmed Mosque (Blue Mosque)',emoji:'🕌',duration:60,activity:'Admire the only mosque in Istanbul with six minarets and the interior\'s 21,000 hand-painted blue Iznik tiles. Visit between prayer times and cover up at the entrance.',travelNote:'Walk 10 min east to Topkapi Palace.',travelToNext:10},
       {name:'Topkapi Palace',emoji:'🏯',duration:120,activity:'See the Ottoman sultans\' imperial treasury — a 86-carat diamond, the Prophet Muhammad\'s cloak and sword, and the famous Harem with 400 rooms for wives and concubines.',travelNote:'Walk 15 min west through the Grand Bazaar.',travelToNext:15},
       {name:'Grand Bazaar',emoji:'🛍️',duration:90,activity:'Navigate 4,000 shops across 61 covered streets — the world\'s oldest shopping mall (1455). Bargain for Turkish ceramics, evil eye charms, spices, and handmade leather goods.',travelNote:'Walk 20 min to the Bosphorus waterfront for a sunset cruise.',travelToNext:20},
       {name:'Bosphorus Sunset Cruise',emoji:'⛵',duration:120,activity:'Float between Europe and Asia on the strait that splits the continents, watching Ottoman palaces and fortresses slide past as the city\'s minarets catch the evening light.',travelNote:'',travelToNext:0}],
      [{name:'Spice Bazaar & Eminönü',emoji:'🧄',duration:75,activity:'Browse the Egyptian Bazaar\'s spice sellers piled with saffron, Turkish delight, and dried figs, then watch the ferries and fishermen at the Eminönü waterfront.',travelNote:'Walk 10 min north across the Galata Bridge to Galata Tower.',travelToNext:10},
       {name:'Galata Tower',emoji:'🗼',duration:60,activity:'Climb to the top of the 14th-century Genoese tower for panoramic views of Istanbul spanning both continents — the cafe at the top serves çay while you take it all in.',travelNote:'Walk 5 min to Istiklal Street.',travelToNext:5},
       {name:'Istiklal Street & Taksim',emoji:'🚃',duration:75,activity:'Walk the 1.4 km pedestrian avenue with its red heritage tram — lined with consulates, churches, pastry shops, and a Galatasaray market. Explore the fish market arcade inside.',travelNote:'Take taxi 20 min to Ortaköy by the Bosphorus.',travelToNext:20},
       {name:'Ortaköy & Bosphorus Bridge Views',emoji:'🌉',duration:60,activity:'Eat a kumpir (stuffed baked potato) from the famous carts by Ortaköy Mosque — framed perfectly by the 1,560m Bosphorus Bridge spanning the two continents above.',travelNote:'Take taxi 20 min back to Karaköy.',travelToNext:20},
       {name:'Karaköy Rooftop Dinner',emoji:'🌃',duration:90,activity:'Dine on a rooftop terrace in the hip Karaköy neighborhood — Mikla restaurant has perhaps the best Istanbul skyline view, or try Salt Galata for cocktails above the Bosphorus.',travelNote:'',travelToNext:0}]

    sydney:[
      [{name:'Sydney Opera House',emoji:'🎭',duration:90,activity:'Take a guided backstage tour of the sail-shaped shells to learn about the engineering miracle and acoustics. Or book tickets for a performance — even a short recital is memorable.',travelNote:'Walk 10 min through the Royal Botanic Garden.',travelToNext:10},
       {name:'Royal Botanic Garden & Mrs Macquaries Chair',emoji:'🌿',duration:60,activity:'Stroll the harborside garden to Mrs Macquaries Chair — the stone bench cut for Governor Phillip\'s wife, with the best view of the Opera House and Harbour Bridge together.',travelNote:'Walk back past Circular Quay to the Harbour Bridge foot.',travelToNext:20},
       {name:'Sydney Harbour Bridge Walk',emoji:'🌉',duration:120,activity:'Walk across the 1,149m arch (free, both sides) for views of the harbor, bays, and skyline. Or book the BridgeClimb to reach the actual summit arch 134m above the water.',travelNote:'Walk down to The Rocks village below the bridge.',travelToNext:15},

  function generateDayPlan(destination, day) {
    const dest = (destination || '').toLowerCase().replace(/,.*$/, '').trim();
    const key = Object.keys(CURATED_PLANS).find(k => dest.includes(k) || k.includes(dest));
    if (!key) throw new Error(
      `No curated day plan for "${destination || 'this destination'}" yet.\n\n` +
      `Try one of these: Tokyo, Kyoto, Osaka, Bali, Bangkok, Singapore, Seoul, Hong Kong, Taipei, Phuket, Siem Reap, ` +
      `Paris, Rome, Barcelona, London, Amsterdam, Prague, New York, Los Angeles, Cancun, Dubai, Istanbul, Sydney, or Manila.`
    );
    const plans = CURATED_PLANS[key];
    return plans[(day - 1) % plans.length];
  }

  /* ── NEARBY-PLACE SUGGESTIONS ── */
  let suggestionsCache = {};
  let poiCache = {};

  /* Curated fallback for popular destinations */

  function getCuratedSuggestions(destination, day) {
    const key = Object.keys(CURATED).find(k => destination.toLowerCase().includes(k));
    if (!key) return null;
    const list = CURATED[key];
    const start = (day - 1) % list.length;
    return [...list.slice(start), ...list.slice(0, start)].slice(0, 6);
  }

  function lsKey(dest) { return `roamly_pois_${dest.toLowerCase().replace(/\s+/g,'_')}`; }
  function saveToLS(dest, pois) { try { localStorage.setItem(lsKey(dest), JSON.stringify({pois, ts: Date.now()})); } catch(e){} }
  function loadFromLS(dest) {
    try {
      const raw = localStorage.getItem(lsKey(dest));
      if (!raw) return null;
      const {pois, ts} = JSON.parse(raw);
      if (Date.now() - ts > 86400000) return null; // expire after 24h
      return pois;
    } catch(e) { return null; }
  }

  document.getElementById('suggest-btn').addEventListener('click', async () => {
    const panel = document.getElementById('suggest-panel');
    // Toggle off if already open with results
    if (panel.style.display !== 'none' && !panel.querySelector('.suggest-skeleton')) {
      panel.style.display = 'none';
      return;
    }
    const cacheKey = `${trip?.destination}__day${activeDay}`;
    if (suggestionsCache[cacheKey]) {
      renderSuggestions(suggestionsCache[cacheKey]);
      return;
    }
    showSuggestLoading();
    try {
      const suggestions = await fetchSuggestions(trip?.destination, activeDay);
      suggestionsCache[cacheKey] = suggestions;
      renderSuggestions(suggestions);
    } catch (err) {
      showSuggestError(err.message);
    }
  });

  function showSuggestLoading() {
    const panel = document.getElementById('suggest-panel');
    panel.style.display = 'block';
    const btn = document.getElementById('suggest-btn');
    btn.classList.add('loading');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="animation:spin .9s linear infinite"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3" stroke-dasharray="20 10"/></svg> Finding stops…`;
    panel.innerHTML = `
      <div class="suggest-panel-header">
        <div class="suggest-panel-title">📍 Nearby places <span class="suggest-badge">Map data</span></div>
      </div>
      <div class="suggest-grid">${Array(6).fill('<div class="suggest-skeleton"></div>').join('')}</div>`;
  }

  function renderSuggestions(suggestions) {
    const btn = document.getElementById('suggest-btn');
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1l1.5 3.5L12 5.5l-3 2.8.7 3.7L7 10.2 3.3 12l.7-3.7L1 5.5l3.5-1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg> Suggest Stops`;
    const panel = document.getElementById('suggest-panel');
    panel.style.display = 'block';
    panel.innerHTML = `
      <div class="suggest-panel-header">
        <div class="suggest-panel-title">📍 Nearby for Day ${activeDay} <span class="suggest-badge">${esc(trip?.destination)}</span></div>
        <button class="suggest-close-btn" id="suggest-panel-close">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="suggest-grid">
        ${suggestions.map(s => `
          <div class="suggest-card" data-name="${esc(s.name)}" data-emoji="${esc(s.emoji)}" data-duration="${s.duration}" data-notes="${esc(s.description||'')}">
            <div class="suggest-card-top">
              <span class="suggest-emoji">${esc(s.emoji)}</span>
              <span class="suggest-name">${esc(s.name)}</span>
            </div>
            <div class="suggest-desc">${esc(s.description)}</div>
            <div class="suggest-meta">
              <span class="suggest-duration">${s.duration} min</span>
              <button class="suggest-add-btn">+ Add to Day</button>
            </div>
          </div>`).join('')}
      </div>`;
    document.getElementById('suggest-panel-close')?.addEventListener('click', () => {
      panel.style.display = 'none';
    });
    panel.querySelectorAll('.suggest-card').forEach(card => {
      card.addEventListener('click', () => {
        openStopModal();
        document.getElementById('stop-name').value = card.dataset.name;
        document.getElementById('stop-duration').value = card.dataset.duration;
        document.getElementById('stop-notes').value = card.dataset.notes;
        const emoji = card.dataset.emoji;
        selectedEmoji = emoji;
        document.querySelectorAll('.emoji-opt').forEach(b => b.classList.toggle('selected', b.dataset.emoji === emoji));
      });
    });
  }

  function showSuggestError(msg) {
    const btn = document.getElementById('suggest-btn');
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1l1.5 3.5L12 5.5l-3 2.8.7 3.7L7 10.2 3.3 12l.7-3.7L1 5.5l3.5-1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg> Suggest Stops`;
    const panel = document.getElementById('suggest-panel');
    panel.style.display = 'block';
    panel.innerHTML = `
      <div class="suggest-panel-header">
        <div class="suggest-panel-title">📍 Nearby places <span class="suggest-badge">Map data</span></div>
        <button class="suggest-close-btn" id="suggest-panel-close2">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="suggest-error">⚠️ Couldn't load nearby places for this destination. Try a more specific name (e.g. "Kyoto, Japan").<br><small style="opacity:.7">${esc(msg)}</small></div>`;
    document.getElementById('suggest-panel-close2')?.addEventListener('click', () => { panel.style.display = 'none'; });
  }

  /* Classify an OSM tag set into an emoji/duration/label for the suggestion card */
  function classifyPOI(tags) {
    const rules = [
      [['tourism', 'attraction'], { emoji: '📍', duration: 90, label: 'Popular attraction' }],
      [['tourism', 'museum'],     { emoji: '🏛️', duration: 120, label: 'Museum' }],
      [['tourism', 'gallery'],    { emoji: '🎨', duration: 75,  label: 'Art gallery' }],
      [['tourism', 'viewpoint'],  { emoji: '🌆', duration: 30,  label: 'Scenic viewpoint' }],
      [['tourism', 'zoo'],        { emoji: '🦁', duration: 120, label: 'Zoo' }],
      [['tourism', 'theme_park'], { emoji: '🎡', duration: 150, label: 'Theme park' }],
      [['amenity', 'restaurant'], { emoji: '🍽️', duration: 60,  label: 'Restaurant' }],
      [['amenity', 'cafe'],       { emoji: '☕', duration: 30,  label: 'Café' }],
      [['leisure', 'park'],       { emoji: '🌿', duration: 45,  label: 'Park' }],
      [['leisure', 'garden'],     { emoji: '🌸', duration: 40,  label: 'Garden' }],
      [['historic', null],       { emoji: '🏰', duration: 60,  label: 'Historic site' }],
      [['shop', null],           { emoji: '🛍️', duration: 45,  label: 'Shopping' }],
    ];
    for (const [[key, val], meta] of rules) {
      if (tags[key] && (val === null || tags[key] === val)) return meta;
    }
    return { emoji: '📍', duration: 60, label: 'Point of interest' };
  }

  /* Deterministic shuffle so each day shows a different slice of the same POI pool without re-fetching */
  function seededShuffle(arr, seed) {
    const a = arr.slice();
    let s = seed % 233280;
    for (let i = a.length - 1; i > 0; i--) {
      s = (s * 9301 + 49297) % 233280;
      const j = Math.floor((s / 233280) * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function fetchWithTimeout(url, opts = {}, ms = 10000) {
    const ctrl = new AbortController();
    const id = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { ...opts, signal: ctrl.signal })
      .then(r => { clearTimeout(id); return r; })
      .catch(e => { clearTimeout(id); throw e.name === 'AbortError' ? new Error('Request timed out — check your connection') : e; });
  }

  async function geocodeDestination(destination) {
    const res = await fetchWithTimeout(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(destination)}`, { headers: { 'Accept-Language': 'en' } });
    if (!res.ok) throw new Error(`Geocoding failed (HTTP ${res.status})`);
    const data = await res.json();
    if (!data.length) throw new Error(`Could not find "${destination}" on the map`);
    return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
  }

  async function fetchNearbyPOIs(destination) {
    if (poiCache[destination]) return poiCache[destination];
    const cached = loadFromLS(destination);
    // Bust cache if it still has Japanese/non-English names (legacy)
    const hasNonAscii = cached?.some(p => /[^\x00-\x7F]/.test(p.name));
    if (cached && !hasNonAscii) { poiCache[destination] = cached; return cached; }
    const { lat, lon } = await geocodeDestination(destination);
    const overpassQuery = `[out:json][timeout:15];(
      node["tourism"~"attraction|museum|gallery|viewpoint|zoo|theme_park"](around:5000,${lat},${lon});
      node["amenity"~"restaurant|cafe"](around:2000,${lat},${lon});
      node["leisure"~"park|garden"](around:4000,${lat},${lon});
      node["historic"](around:5000,${lat},${lon});
    );out body 40;`;
    const res = await fetchWithTimeout('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(overpassQuery)
    }, 15000);
    if (!res.ok) throw new Error(`Could not load nearby places (HTTP ${res.status})`);
    const data = await res.json();
    const seenNames = new Set();
    const pois = [];
    for (const el of data.elements || []) {
      const name = el.tags?.['name:en'] || el.tags?.['name:en-US'] || el.tags?.name;
      if (!name || seenNames.has(name)) continue;
      seenNames.add(name);
      pois.push({ name, ...classifyPOI(el.tags) });
    }
    poiCache[destination] = pois;
    saveToLS(destination, pois);
    return pois;
  }

  async function fetchSuggestions(destination, day) {
    try {
      const pois = await fetchNearbyPOIs(destination);
      if (pois.length) {
        const shuffled = seededShuffle(pois, day * 7919 + destination.length);
        return shuffled.slice(0, 6).map(p => ({ name: p.name, emoji: p.emoji, duration: p.duration, description: p.label }));
      }
    } catch(e) {
      console.warn('Map API failed, using curated list:', e.message);
    }
    const curated = getCuratedSuggestions(destination, day);
    if (curated) return curated;
    throw new Error(`No suggestions found for "${destination}". Try a more specific city name.`);
  }

  /* ── INIT ── */
  const auth = getAuth(app);
  onAuthStateChanged(auth, user => {
    if (user) {
      loadTrip();
    } else if (!session) {
      window.location.href = 'login.html';
    } else {
      // session exists but Firebase auth not restored — load anyway
      loadTrip();
    }
  });
</script>
